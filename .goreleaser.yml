version: 2

builds:
  - id: tracer
    main: .
    binary: tracer
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w

archives:
  - id: default
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE

homebrew_casks:
  - repository:
      owner: beaugunderson
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: tracer
    homepage: https://github.com/beaugunderson/tracer
    description: mtr-style continuous traceroute with braille sparklines
    binaries:
      - tracer
    # The binary is unsigned, so strip the Gatekeeper quarantine flag on install
    # rather than have macOS block it on first run.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tracer"]
          end

changelog:
  sort: asc
